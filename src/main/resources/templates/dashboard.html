<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px;
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .header p {
            font-size: 24px;
            color: #666;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .content {
            margin-bottom: 40px;
        }

        .content-text {
            font-size: 18px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1 th:text="${userName}">Xin chào</h1>
            <p th:text="${message}">Chào mừng đến với Dashboard của tôi</p>
        </div>

        <div class="content">
            <p class="content-text">
                Đây là một trang dashboard đơn giản với giao diện hiện đại và bố cục tương ứng.
            </p>

            <div class="stats">
                <div class="stat-card">
                    <h3>Người dùng</h3>
                    <div class="number">1.2K</div>
                </div>
                <div class="stat-card">
                    <h3>Dự án</h3>
                    <div class="number">24</div>
                </div>
                <div class="stat-card">
                    <h3>Hoạt động</h3>
                    <div class="number">89%</div>
                </div>
                <div class="stat-card">
                    <h3>Đánh giá</h3>
                    <div class="number">4.8⭐</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary">Bắt đầu</button>
            <button class="btn btn-secondary">Tìm hiểu thêm</button>
        </div>

        <div class="footer">
            <p>&copy; 2026 Dashboard. Tất cả quyền được bảo lưu.</p>
        </div>
    </div>
</body>
</html>
